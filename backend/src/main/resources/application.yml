spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:mysql://localhost:3306/${DB_NAME:reviewin_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 52MB

jwt:
  secret: ${JWT_SECRET:change-me-please-change-me-please-change-me-please}
  expiration: 86400000

file:
  upload-dir: ./uploads

otp:
  expiry-minutes: ${OTP_EXPIRY_MINUTES:10}
  code-length: ${OTP_CODE_LENGTH:6}

server:
  port: ${PORT:8080}
